<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Casa Model — Schematic Walkthrough</title>
<meta name="description" content="Interactive schematic 3D model of the house, built from described room layout and measurements." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=General+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --font-display: 'Fraunces', serif;
    --font-body: 'General Sans', -apple-system, sans-serif;
    --color-bg: #efe7d8;
    --color-surface: rgba(255,250,240,0.82);
    --color-border: rgba(60,45,30,0.14);
    --color-text: #2c2318;
    --color-text-muted: #6b5c47;
    --color-primary: #b5573c;
    --color-primary-dark: #8a3f2a;
    --text-xs: 12px;
    --text-sm: 13px;
    --text-base: 15px;
    --text-lg: 18px;
    --text-xl: 24px;
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-6: 24px;
    --panel-radius: 14px;
    --transition-ui: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:var(--font-body);background:var(--color-bg);}
  #canvas-holder{position:fixed;inset:0;}
  canvas{display:block;touch-action:none;}

  .ui{position:fixed;inset:0;pointer-events:none;z-index:10;color:var(--color-text);}
  .ui [data-interactive]{pointer-events:auto;}

  .panel{
    background:var(--color-surface);
    backdrop-filter:blur(14px);
    border:1px solid var(--color-border);
    border-radius:var(--panel-radius);
    box-shadow:0 8px 30px rgba(50,35,20,0.14);
  }

  .controls{
    position:absolute; bottom:var(--space-4); left:var(--space-4);
    padding:var(--space-2);
    display:flex; gap:var(--space-1); flex-wrap:wrap; max-width:260px;
  }
  .btn{
    font-family:var(--font-body); font-size:var(--text-sm); font-weight:500;
    color:var(--color-text); background:transparent; border:1px solid var(--color-border);
    border-radius:10px; padding:8px 12px; cursor:pointer; transition:background var(--transition-ui), color var(--transition-ui);
    white-space:nowrap;
  }
  .btn:hover{ background:rgba(181,87,60,0.1); }
  .btn.active{ background:var(--color-primary); border-color:var(--color-primary); color:#fdf6ee; }
  .btn-window-style{
    font-size:var(--text-lg); font-weight:600; padding:16px 22px;
    border-width:2px; border-color:var(--color-primary); color:#fdf6ee;
    background:rgba(181,87,60,0.5);
  }
  .btn-window-style:hover{ background:rgba(181,87,60,0.65); }
  /* Style-comparison buttons (windows/door/gate) are hidden until the
     "Ver opciones de estilo" master toggle is switched on. */
  .style-btn{ display:none; }
  .style-btn.show{ display:inline-block; }

  .legend{
    position:absolute; bottom:var(--space-4); right:var(--space-4);
    padding:var(--space-3) var(--space-4); max-width:200px;
  }
  .legend h2{font-size:var(--text-xs); text-transform:uppercase; letter-spacing:0.06em; color:var(--color-text-muted); margin:0 0 var(--space-2) 0; font-weight:600;}
  .legend-row{display:flex; align-items:center; gap:8px; font-size:var(--text-xs); margin-bottom:6px;}
  .swatch{width:11px;height:11px;border-radius:3px;flex-shrink:0;}

  .hint{
    position:absolute; top:var(--space-4); left:50%; transform:translateX(-50%);
    padding:6px 14px; font-size:var(--text-xs); color:var(--color-text-muted);
    opacity:0.9;
  }

  @media (max-width:640px){
    .legend{display:none;}
    .hint{display:none;}
  }
</style>
</head>
<body>

<div id="canvas-holder"></div>

<div class="ui">
  <div class="hint panel" id="hint">Drag to orbit · scroll to zoom · right-drag to pan</div>

  <div class="controls">
    <button class="btn active" id="btnOrbit" data-interactive>Orbit view</button>
    <button class="btn" id="btnTop" data-interactive>Floor plan</button>
    <button class="btn" id="btnWalk" data-interactive>Walk through</button>
    <button class="btn active" id="btnLabels" data-interactive>Labels: on</button>
    <button class="btn" id="btnRoof" data-interactive>Roof: off</button>
    <button class="btn" id="btnStyleOptions" data-interactive>Ver opciones de estilo: desactivado</button>
    <button class="btn btn-window-style style-btn" id="btnWindowStyle" data-interactive>Ventanas: Caoba sin cuadrícula (elegido)</button>
    <button class="btn btn-window-style style-btn" id="btnDoorStyle" data-interactive>Puerta principal: Doble caoba con vidrio (elegida)</button>
    <button class="btn btn-window-style style-btn" id="btnGateStyle" data-interactive>Portón y rejas: Panel sólido caoba</button>
  </div>

  <div class="legend panel">
    <h2>Habitaciones</h2>
    <div class="legend-row"><span class="swatch" style="background:#c98f6d"></span>Sala</div>
    <div class="legend-row"><span class="swatch" style="background:#d9b26a"></span>Cocina</div>
    <div class="legend-row"><span class="swatch" style="background:#b7a68c"></span>Pasillo</div>
    <div class="legend-row"><span class="swatch" style="background:#9fb08a"></span>Recámara 1 (Ana)</div>
    <div class="legend-row"><span class="swatch" style="background:#8fa6b0"></span>Baño (×2)</div>
    <div class="legend-row"><span class="swatch" style="background:#a58fb0"></span>Recámara 2 (Abuela Cande)</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"
  }
}
</script>
<script type="module" src="./main.js"></script>
</body>
</html>
